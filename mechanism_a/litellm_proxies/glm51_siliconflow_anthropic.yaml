model_list:
  - model_name: "*"
    litellm_params:
      model: openai/Pro/zai-org/GLM-5.1
      api_base: https://api.siliconflow.cn/v1
      api_key: os.environ/SILICONFLOW_API_KEY
    model_info:
      mode: chat
general_settings:
  master_key: sk-litellm-virtual
litellm_settings:
  drop_params: true
  set_verbose: false
  disable_responses_api: true
